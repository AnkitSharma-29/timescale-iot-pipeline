<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 900 360" font-family="Segoe UI, Arial, sans-serif">
  <rect width="900" height="360" fill="#0f1117"/>
  <text x="450" y="34" fill="#e6e6e6" font-size="20" font-weight="700" text-anchor="middle">Real-Time IoT Analytics Pipeline on TimescaleDB</text>

  <!-- Generator -->
  <rect x="30" y="120" width="170" height="120" rx="10" fill="#1b2130" stroke="#f5a623" stroke-width="2"/>
  <text x="115" y="150" fill="#f5a623" font-size="14" font-weight="700" text-anchor="middle">generator.py</text>
  <text x="115" y="175" fill="#b8c0cc" font-size="11" text-anchor="middle">30 simulated</text>
  <text x="115" y="192" fill="#b8c0cc" font-size="11" text-anchor="middle">vehicles</text>
  <text x="115" y="215" fill="#7fd1ae" font-size="12" text-anchor="middle" font-weight="700">~278 rows/sec</text>

  <!-- arrow -->
  <line x1="200" y1="180" x2="290" y2="180" stroke="#4a90d9" stroke-width="2" marker-end="url(#a)"/>
  <text x="245" y="170" fill="#8a93a0" font-size="10" text-anchor="middle">batched INSERT</text>

  <!-- TimescaleDB -->
  <rect x="290" y="70" width="330" height="230" rx="10" fill="#12261f" stroke="#7fd1ae" stroke-width="2"/>
  <text x="455" y="98" fill="#7fd1ae" font-size="15" font-weight="700" text-anchor="middle">TimescaleDB (PostgreSQL)</text>
  <rect x="312" y="115" width="286" height="34" rx="6" fill="#1b3a2e"/>
  <text x="455" y="137" fill="#d7f2e6" font-size="12" text-anchor="middle">Hypertable — auto hourly chunks</text>
  <rect x="312" y="157" width="286" height="34" rx="6" fill="#1b3a2e"/>
  <text x="455" y="179" fill="#d7f2e6" font-size="12" text-anchor="middle">Columnar compression — 69% saved</text>
  <rect x="312" y="199" width="286" height="34" rx="6" fill="#1b3a2e"/>
  <text x="455" y="221" fill="#d7f2e6" font-size="12" text-anchor="middle">Continuous aggregate — 1-min rollup</text>
  <rect x="312" y="241" width="286" height="34" rx="6" fill="#1b3a2e"/>
  <text x="455" y="263" fill="#d7f2e6" font-size="12" text-anchor="middle">Retention — drop raw after 7 days</text>

  <!-- arrow -->
  <line x1="620" y1="180" x2="710" y2="180" stroke="#4a90d9" stroke-width="2" marker-end="url(#a)"/>
  <text x="665" y="170" fill="#8a93a0" font-size="10" text-anchor="middle">SQL</text>

  <!-- Grafana -->
  <rect x="710" y="120" width="160" height="120" rx="10" fill="#1b2130" stroke="#f5a623" stroke-width="2"/>
  <text x="790" y="150" fill="#f5a623" font-size="14" font-weight="700" text-anchor="middle">Grafana</text>
  <text x="790" y="175" fill="#b8c0cc" font-size="11" text-anchor="middle">live dashboard</text>
  <text x="790" y="192" fill="#b8c0cc" font-size="11" text-anchor="middle">refresh 10s</text>
  <text x="790" y="215" fill="#7fd1ae" font-size="12" text-anchor="middle" font-weight="700">1.8ms reads</text>

  <text x="450" y="335" fill="#8a93a0" font-size="11" text-anchor="middle">In production the generator would be replaced by Kafka &#8594; Kafka Connect. Everything else is unchanged.</text>

  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4a90d9"/>
    </marker>
  </defs>
</svg>
